<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroStar Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════
   PALETA ENFAGROW ADVANCE + NEUROSTAR
   Morado profundo : #4a1a8c
   Morado medio    : #7b3fbd
   Dorado          : #c8971a / #e6b830
   Dorado claro    : #f5d87a
   Azul marino     : #1a2f6e
   Crema           : #fffcf0
══════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  text-align: center;
  background-color: #fffcf0;
  background-image:
    radial-gradient(circle at 8% 12%,  rgba(91,45,145,0.18) 0%, transparent 36%),
    radial-gradient(circle at 92% 8%,  rgba(200,151,26,0.18) 0%, transparent 36%),
    radial-gradient(circle at 50% 96%, rgba(91,45,145,0.12) 0%, transparent 38%),
    radial-gradient(circle at 85% 85%, rgba(200,151,26,0.13) 0%, transparent 32%);
  min-height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow-x: hidden;
  position: relative;
}

/* Estrellas decorativas doradas de fondo */
body::before {
  content: "★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★";
  position: fixed;
  top: 0; left: 0; right: 0;
  font-size: 16px;
  color: #c8971a;
  opacity: 0.15;
  letter-spacing: 20px;
  line-height: 2.8;
  white-space: pre-wrap;
  word-break: break-all;
  pointer-events: none;
  z-index: 0;
  padding: 10px;
}

/* ── LOGO NEUROSTAR ── */
#logo {
  position: fixed;
  top: 18px;
  left: 18px;
  font-family: 'Fredoka One', cursive;
  font-size: 30px;
  color: #4a1a8c;
  z-index: 100;
  letter-spacing: -0.5px;
  line-height: 1;
  text-decoration: none;
}
#logo span { color: #c8971a; }
#logo::after {
  content: '';
  display: block;
  height: 3px;
  width: 100%;
  background: linear-gradient(90deg, #4a1a8c, #c8971a);
  border-radius: 3px;
  margin-top: 3px;
}

/* ── TIMER ── */
#timer {
  position: fixed;
  top: 18px;
  right: 18px;
  font-family: 'Fredoka One', cursive;
  font-size: 22px;
  background: linear-gradient(135deg, #7b3fbd, #4a1a8c);
  color: white;
  padding: 8px 20px;
  border-radius: 50px;
  display: none;
  z-index: 100;
  box-shadow: 0 5px 0 #2e0d5c, 0 8px 20px rgba(74,26,140,0.35);
  letter-spacing: 1px;
}
#timer.urgent { background: linear-gradient(135deg, #e05252, #b52020); box-shadow: 0 5px 0 #7a0f0f, 0 8px 20px rgba(180,20,20,0.35); animation: pulse 0.6s infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.07); } }

/* ── APP CONTAINER ── */
#app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 20px 16px 30px;
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── HEADINGS ── */
h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 34px;
  color: #1a2f6e;
  text-shadow: 0 3px 0 rgba(200,151,26,0.35), 0 6px 16px rgba(26,47,110,0.12);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}
h1::after {
  content: '';
  display: block;
  width: 56px;
  height: 4px;
  background: linear-gradient(90deg, #4a1a8c, #e6b830);
  border-radius: 4px;
  margin: 8px auto 0;
}

p {
  font-size: 17px;
  color: #5c3d8a;
  font-weight: 700;
  margin: 10px 0 22px;
}

/* ── BOTÓN PRINCIPAL ── */
button {
  font-family: 'Fredoka One', cursive;
  font-size: 22px;
  padding: 14px 36px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #7b3fbd, #4a1a8c);
  color: white;
  cursor: pointer;
  box-shadow: 0 7px 0 #2e0d5c, 0 10px 24px rgba(74,26,140,0.32);
  transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
}
button::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.45s ease;
}
button:hover::after { transform: translateX(100%); }
button:hover { transform: translateY(-3px); box-shadow: 0 10px 0 #2e0d5c, 0 14px 30px rgba(74,26,140,0.38); }
button:active { transform: translateY(3px); box-shadow: 0 3px 0 #2e0d5c, 0 5px 12px rgba(74,26,140,0.25); }

/* ── ANIMAL OBJETIVO (juego 1) ── */
#target {
  font-size: 82px;
  display: inline-block;
  filter: drop-shadow(0 8px 16px rgba(74,26,140,0.28));
  animation: floatTarget 2.8s ease-in-out infinite;
  margin: 6px 0 4px;
}
@keyframes floatTarget {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50%      { transform: translateY(-10px) rotate(2deg); }
}

/* ── LABEL "Toca:" ── */
.target-label {
  font-size: 15px;
  font-weight: 800;
  color: #7b3fbd;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 2px;
}

/* ── GRIDS ── */
.grid4 {
  display: grid;
  grid-template-columns: repeat(2, 140px);
  grid-gap: 16px;
  margin: 20px auto 0;
  justify-content: center;
}
.grid6 {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  grid-gap: 14px;
  margin: 20px auto 0;
  justify-content: center;
}

/* ── CARDS ── */
.card {
  display: flex;
  justify-content: center;
  align-items: center;
  background: white;
  border-radius: 22px;
  border: 3px solid #e6b830;
  cursor: pointer;
  font-size: 62px;
  box-shadow: 0 7px 0 #b07d10, 0 10px 24px rgba(74,26,140,0.13);
  transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.grid4 .card { width: 140px; height: 140px; }
.grid6 .card { width: 110px; height: 110px; font-size: 48px; }

/* shimmer dorado */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(245,216,122,0.45) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.4s ease;
  border-radius: 20px;
}
.card:hover::after { transform: translateX(100%); }
.card:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 12px 0 #b07d10, 0 16px 30px rgba(74,26,140,0.2); }
.card:active { transform: scale(0.9) translateY(3px); box-shadow: 0 2px 0 #b07d10; }

/* Card oculta (juego memoria) */
.hidden {
  background: linear-gradient(135deg, #7b3fbd, #4a1a8c);
  border-color: #4a1a8c;
  box-shadow: 0 7px 0 #2e0d5c, 0 10px 24px rgba(74,26,140,0.25);
  font-size: 0 !important;
}
.hidden::before {
  content: "?";
  font-family: 'Fredoka One', cursive;
  font-size: 44px;
  color: rgba(255,255,255,0.5);
}
.grid6 .hidden::before { font-size: 36px; }

/* ── FEEDBACK ── */
#feedback {
  margin-top: 18px;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fb-pill {
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  padding: 7px 24px;
  border-radius: 50px;
  display: inline-block;
  animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1);
}
.fb-correct {
  color: #1a2f6e;
  background: linear-gradient(135deg, #f5d87a, #e6b830);
  box-shadow: 0 4px 0 #b07d10, 0 6px 16px rgba(200,151,26,0.3);
}
.fb-try {
  color: white;
  background: linear-gradient(135deg, #7b3fbd, #4a1a8c);
  box-shadow: 0 4px 0 #2e0d5c, 0 6px 16px rgba(74,26,140,0.3);
}
.fb-memory {
  color: #1a2f6e;
  background: linear-gradient(135deg, #f5d87a, #e6b830);
  box-shadow: 0 4px 0 #b07d10, 0 6px 16px rgba(200,151,26,0.3);
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes wobble {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-7px); }
  75%      { transform: translateX(7px); }
}

/* ── PANTALLA RESULTADOS ── */
.results-card {
  background: white;
  border-radius: 28px;
  padding: 28px 24px 32px;
  box-shadow: 0 16px 50px rgba(74,26,140,0.18);
  border: 3px solid #e6b830;
  position: relative;
  overflow: hidden;
  text-align: left;
  margin-top: 12px;
}
.results-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, #4a1a8c, #e6b830, #4a1a8c);
}

.result {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 17px;
  font-weight: 800;
  color: #1a2f6e;
  padding: 10px 14px;
  border-radius: 14px;
  margin-bottom: 8px;
  background: #f7f2ff;
}
.result .pts {
  font-family: 'Fredoka One', cursive;
  font-size: 19px;
  color: #7b3fbd;
  background: rgba(123,63,189,0.1);
  padding: 3px 12px;
  border-radius: 50px;
}

hr {
  border: none;
  border-top: 2px dashed #e6b830;
  margin: 16px 0;
}

.total {
  font-family: 'Fredoka One', cursive;
  font-size: 36px;
  color: #4a1a8c;
  text-align: center;
  text-shadow: 0 3px 0 rgba(230,184,48,0.4);
  margin-top: 4px;
}
.total small {
  display: block;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  color: #7b3fbd;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.meta {
  font-size: 13px;
  color: #9b80c4;
  font-weight: 700;
  text-align: center;
  margin-top: 16px;
}

/* Bienvenida ilustración */
.welcome-icon {
  font-size: 80px;
  display: block;
  margin: 0 auto 12px;
  animation: floatTarget 3s ease-in-out infinite;
  filter: drop-shadow(0 8px 18px rgba(74,26,140,0.2));
}

/* Juego 2 intro card */
.game2-intro {
  background: white;
  border-radius: 24px;
  padding: 24px 20px;
  border: 3px solid #e6b830;
  box-shadow: 0 10px 30px rgba(74,26,140,0.14);
  margin-top: 10px;
}
.game2-intro .icon { font-size: 60px; display: block; margin-bottom: 10px; }

/* Final celebración */
.final-icon {
  font-size: 90px;
  display: block;
  animation: floatTarget 2.5s ease-in-out infinite;
  filter: drop-shadow(0 8px 20px rgba(200,151,26,0.4));
  margin-bottom: 10px;
}

</style>
</head>

<body>

<div id="logo">Neuro<span>Star</span></div>
<div id="timer"></div>
<div id="app"></div>

<script>

const animals=["🐶","🐱","🐻","🐰","🐵","🦒","🐼","🐸"];

let metrics={
  fechaInicio:"",
  horaInicio:"",
  game1:{aciertos:0,errores:0,rondas:0},
  game2:{pares:0,intentos:0}
};

function showWelcome(){
  document.getElementById("app").innerHTML=`
    <span class="welcome-icon">🧠</span>
    <h1>¡Bienvenido!</h1>
    <p>Vamos a jugar unos juegos divertidos</p>
    <button onclick="startGame1()">Toca para empezar</button>
  `;
}

function startGame1(){
  let now=new Date();
  metrics.fechaInicio=now.toLocaleDateString();
  metrics.horaInicio=now.toLocaleTimeString();
  runGame1();
}

function runGame1(){
  document.getElementById("app").innerHTML=`
    <h1>Toca el Animal</h1>
    <div class="target-label">¿Cuál es este?</div>
    <div id="target"></div>
    <div class="grid4">
      <div class="card"></div>
      <div class="card"></div>
      <div class="card"></div>
      <div class="card"></div>
    </div>
    <div id="feedback"></div>
  `;

  document.getElementById("timer").style.display="block";
  document.getElementById("timer").classList.remove("urgent");

  let time=59;
  updateTimer(time);

  let interval=setInterval(()=>{
    time--;
    updateTimer(time);
    if(time<=10) document.getElementById("timer").classList.add("urgent");
    if(time<=0){
      clearInterval(interval);
      transitionGame2();
    }
  },1000);

  function newRound(){
    metrics.game1.rondas++;
    let target=animals[Math.floor(Math.random()*animals.length)];
    document.getElementById("target").innerText=target;
    let options=[target];
    while(options.length<4){
      let a=animals[Math.floor(Math.random()*animals.length)];
      if(!options.includes(a)) options.push(a);
    }
    options.sort(()=>Math.random()-0.5);
    let cards=document.querySelectorAll(".grid4 .card");
    cards.forEach((card,i)=>{
      card.innerText=options[i];
      card.onclick=()=>{
        if(options[i]==target){
          metrics.game1.aciertos++;
          document.getElementById("feedback").innerHTML=
            "<span class='fb-pill fb-correct'>¡Correcto! ⭐</span>";
        }else{
          metrics.game1.errores++;
          document.getElementById("feedback").innerHTML=
            "<span class='fb-pill fb-try'>Intenta otra vez 👀</span>";
        }
        setTimeout(newRound,400);
      };
    });
  }

  newRound();
}

function transitionGame2(){
  document.getElementById("timer").style.display="none";
  document.getElementById("app").innerHTML=`
    <h1>Juego 2</h1>
    <div class="game2-intro">
      <span class="icon">🧩</span>
      <p style="margin-bottom:20px">¡Encuentra los pares<br>iguales!</p>
      <button onclick="runGame2()">Toca para empezar</button>
    </div>
  `;
}

function runGame2(){
  document.getElementById("timer").style.display="block";
  document.getElementById("timer").classList.remove("urgent");
  document.getElementById("app").innerHTML=`
    <h1>Encuentra el Par</h1>
    <div class="grid6" id="grid"></div>
    <div id="feedback"></div>
  `;

  let time=59;
  updateTimer(time);

  let interval=setInterval(()=>{
    time--;
    updateTimer(time);
    if(time<=10) document.getElementById("timer").classList.add("urgent");
    if(time<=0){
      clearInterval(interval);
      showFinal();
    }
  },1000);

  setupRound();
}

function setupRound(){
  let shuffled=[...animals].sort(()=>Math.random()-0.5);
  let pair=shuffled[0];
  let cards=[pair,pair,shuffled[1],shuffled[2],shuffled[3],shuffled[4]];
  cards.sort(()=>Math.random()-0.5);

  let grid=document.getElementById("grid");
  grid.innerHTML="";
  let flipped=[];

  cards.forEach(animal=>{
    let card=document.createElement("div");
    card.className="card hidden";
    card.onclick=()=>{
      if(flipped.length===2) return;
      card.classList.remove("hidden");
      card.innerText=animal;
      flipped.push({card,animal});
      if(flipped.length===2){
        metrics.game2.intentos++;
        if(flipped[0].animal===flipped[1].animal){
          metrics.game2.pares++;
          document.getElementById("feedback").innerHTML=
            "<span class='fb-pill fb-memory'>¡Par encontrado! 🎉 × "+metrics.game2.pares+"</span>";
          setTimeout(setupRound,600);
        }else{
          setTimeout(()=>{
            flipped.forEach(f=>{
              f.card.classList.add("hidden");
              f.card.innerText="";
            });
            flipped=[];
          },700);
        }
      }
    };
    grid.appendChild(card);
  });
}

function showFinal(){
  document.getElementById("timer").style.display="none";
  document.getElementById("app").innerHTML=`
    <span class="final-icon">🎉</span>
    <h1>¡Buen juego!</h1>
    <p>¡Lo hiciste increíble!</p>
    <button onclick="showResults()">Ver mis resultados</button>
  `;
}

function showResults(){
  let attention=Math.round((metrics.game1.aciertos/metrics.game1.rondas)*100)||0;
  let memory=Math.round((metrics.game2.pares/metrics.game2.intentos)*100)||0;
  let speed=Math.max(0,100-(metrics.game1.errores*5));
  let control=Math.max(0,100-(metrics.game1.errores*10));
  let executive=Math.round((attention+memory+control)/3);

  let wA=attention*0.30;
  let wM=memory*0.25;
  let wS=speed*0.20;
  let wC=control*0.15;
  let wE=executive*0.10;
  let total=Math.round(wA+wM+wS+wC+wE);

  let medal = total>=80?"🏆":total>=60?"⭐":"💪";

  document.getElementById("app").innerHTML=`
    <h1>Resultados</h1>
    <div class="results-card">
      <div class="result"><span>👀 Atención</span><span class="pts">${wA.toFixed(1)} pts</span></div>
      <div class="result"><span>🧩 Memoria</span><span class="pts">${wM.toFixed(1)} pts</span></div>
      <div class="result"><span>⚡ Velocidad</span><span class="pts">${wS.toFixed(1)} pts</span></div>
      <div class="result"><span>🚦 Control inhibitorio</span><span class="pts">${wC.toFixed(1)} pts</span></div>
      <div class="result"><span>🎯 Función ejecutiva</span><span class="pts">${wE.toFixed(1)} pts</span></div>
      <hr>
      <div class="total">
        <small>Score Cognitivo Total</small>
        ${medal} ${total} / 100
      </div>
      <div class="meta">📅 ${metrics.fechaInicio} &nbsp;·&nbsp; 🕐 ${metrics.horaInicio}</div>
    </div>
  `;
}

function updateTimer(t){
  document.getElementById("timer").innerText=
    "⏱ 00:"+String(t).padStart(2,"0");
}

showWelcome();

</script>
</body>
</html>
